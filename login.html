<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GirlTalk · Log ind</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="page-login">

<main class="login">
  <div class="lhero">
    <p class="llogo">GIRLTALK ♥ DK</p>
    <p class="ltag">Portal for frivillige rådgivere</p>
    <span class="lbadge">Login krævet · Kun frivillige</span>
  </div>
  <div class="lbody">
    <h1 class="lh">Velkommen tilbage</h1>
    <p class="ls">Log ind med din GirlTalk-konto for at starte din vagt og rådgive unge.</p>
    <div class="ig">
      <label class="il" for="email-input">E-mail</label>
      <input class="inp" id="email-input" type="email" placeholder="navn@girltalk.dk">
    </div>
    <div class="ig">
      <label class="il" for="pw-input">Adgangskode</label>
      <input class="inp" id="pw-input" type="password" placeholder="••••••••" minlength="8">
      <p id="pw-msg"></p>
    </div>
    <p class="fgt">Glemt adgangskode?</p>
    <button class="lbtn" id="login-btn">Log ind som frivillig →</button>
    <p class="lnote">Kun for godkendte GirlTalk-frivillige.</p>
  </div>
</main>

<script src="js/login.js"></script>
</body>
</html>
